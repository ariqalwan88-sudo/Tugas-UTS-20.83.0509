<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EduWeb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">EduWeb</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="signin.html" class="btn-signin" style="background-color: #eff6ff;">Sign In</a></li>
                <li><a href="signup.html" class="btn-signup">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Sign In</h2>
            <form action="#">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required>
                </div>
                <button type="submit" class="btn-submit">Masuk</button>
            </form>
            <p style="text-align: center; margin-top: 15px; font-size: 14px;">Belum punya akun? <a href="signup.html">Daftar di sini</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 EduWeb. Seluruh Hak Cipta Dilindungi.</p>
    </footer>
</body>
</html>
