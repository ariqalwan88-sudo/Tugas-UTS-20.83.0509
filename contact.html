<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - EduWeb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">EduWeb</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html" style="color: #2563eb;">Contact</a></li>
                <li><a href="signin.html" class="btn-signin">Sign In</a></li>
                <li><a href="signup.html" class="btn-signup">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Hubungi Kami</h2>
            <form action="#">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" placeholder="Masukkan nama Anda" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="nama@email.com" required>
                </div>
                <div class="form-group">
                    <label>Pesan</label>
                    <textarea rows="4" placeholder="Tuliskan pesan Anda di sini..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Kirim Pesan</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 EduWeb. Seluruh Hak Cipta Dilindungi.</p>
    </footer>
</body>
</html>
